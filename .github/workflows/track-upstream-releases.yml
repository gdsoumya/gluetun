name: Track upstream releases
on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  track:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check latest upstream release
        id: latest
        run: |
          TAG=$(gh api repos/qdm12/gluetun/releases/latest --jq .tag_name)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code origin "refs/heads/${TAG}-custom" >/dev/null; then
            echo "branch ${TAG}-custom already exists"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create custom release branch
        if: steps.latest.outputs.exists == 'false'
        id: create
        env:
          TAG: ${{ steps.latest.outputs.tag }}
        run: |
          git remote add upstream https://github.com/qdm12/gluetun.git
          git fetch upstream master "refs/tags/${TAG}:refs/tags/${TAG}"
          git checkout -b "${TAG}-custom" "refs/tags/${TAG}"
          BASE=$(git merge-base origin/master upstream/master)
          if git cherry-pick "${BASE}..origin/master"; then
            git push origin "${TAG}-custom"
            gh workflow run build-custom-release.yml --ref "${TAG}-custom"
          else
            CONFLICT_COMMIT=$(git rev-parse CHERRY_PICK_HEAD 2>/dev/null || echo unknown)
            CONFLICT_SUBJECT=$(git log -1 --format=%s "$CONFLICT_COMMIT" 2>/dev/null || echo unknown)
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U | head -50)
            git cherry-pick --abort
            {
              echo "conflict=true"
              echo "commit=$CONFLICT_COMMIT"
              echo "subject=$CONFLICT_SUBJECT"
              echo "files<<EOF"
              echo "$CONFLICT_FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update conflict issue
        if: steps.create.outputs.conflict == 'true'
        env:
          TAG: ${{ steps.latest.outputs.tag }}
          CONFLICT_COMMIT: ${{ steps.create.outputs.commit }}
          CONFLICT_SUBJECT: ${{ steps.create.outputs.subject }}
          CONFLICT_FILES: ${{ steps.create.outputs.files }}
        run: |
          gh label create custom-release-conflict --color D93F0B \
            --description "Cherry-pick of custom commits onto a release tag failed" 2>/dev/null || true
          BODY="Creating branch \`${TAG}-custom\` from upstream tag \`${TAG}\` failed while cherry-picking the custom commits from master.

          - Master commit to check: \`${CONFLICT_COMMIT}\` (${CONFLICT_SUBJECT})
          - Conflicting files:
          \`\`\`
          ${CONFLICT_FILES}
          \`\`\`

          Create the branch manually, see the \"Creating a release branch\" section of CLAUDE.md.

          cc @gdsoumya"
          EXISTING=$(gh issue list --label custom-release-conflict --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "Release branch creation conflict: ${TAG}-custom" \
              --label custom-release-conflict --body "$BODY"
          fi
          exit 1
