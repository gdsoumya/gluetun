name: Build custom release
on:
  push:
    branches:
      - "v*-custom"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          echo "tag=${GITHUB_REF_NAME}-$(date -u +%d%m%Y)" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:${{ github.ref_name }}
          build-args: |
            VERSION=${{ steps.vars.outputs.tag }}
            CREATED=${{ steps.vars.outputs.created }}
            COMMIT=${{ github.sha }}

      - name: Create or update GitHub release
        env:
          TAG: ${{ steps.vars.outputs.tag }}
          IMAGE: ${{ steps.vars.outputs.image }}
        run: |
          NOTES="Docker image:
          \`\`\`
          docker pull ${IMAGE}:${TAG}
          \`\`\`
          Built from branch \`${GITHUB_REF_NAME}\` at ${GITHUB_SHA}."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --cleanup-tag --yes
          fi
          gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --notes "$NOTES"
